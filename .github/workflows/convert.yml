name: Auto Convert Xray to Sing-Box

on:
  schedule:
    # Запуск каждые 2 часа (в 00:00, 02:00, 04:00, 06:00 UTC и т.д.)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Позволяет запускать конвертацию вручную одной кнопкой

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script
        env:
          XRAY_SUBSCRIPTION_URL: ${{ secrets.XRAY_SUBSCRIPTION_URL }}
        run: python convert.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sing-box.json
          git status
          git diff-index --quiet HEAD || (git commit -m "Auto-update sing-box subscription" && git push)
